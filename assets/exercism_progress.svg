<svg width="550" height="384" viewBox="0 0 550 384" xmlns="http://www.w3.org/2000/svg">

  <style>
    :root {
      --bg: #e5e7eb;
      --text: #111827;
      --subtext: #374151;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #2a2f3a;
        --text: #f3f4f6;
        --subtext: #9ca3af;
      }
    }

    .heading {
      font-family: sans-serif;
      font-size: 20px;
      font-weight: 600;
      fill: var(--text);
    }

    .label, .progress-text {
      font-family: sans-serif;
      font-size: 14px;
      fill: var(--subtext);
    }

    .bar-bg {
      fill: var(--bg);
    }
  </style>

  <text x="20" y="40" class="heading">Exercism Progress</text>

  
  <text x="20" y="112.66666666666667" class="label">Bash :</text>

  <rect x="110" y="99.0" width="350.0" height="18"
        rx="4" ry="4" class="bar-bg"/>

  <rect x="110" y="99.0" width="0" height="18"
        rx="4" ry="4"
        fill="#89e051">
    <animate attributeName="width"
             from="0"
             to="7"
             dur="1.5s"
             fill="freeze"
             calcMode="spline"
             keySplines="0.4 0 0.2 1"
             keyTimes="0;1"/>
  </rect>

  <text x="470.0" y="112.66666666666667"
        class="progress-text">2.15%</text>

  <text x="20" y="147.66666666666666" class="label">C :</text>

  <rect x="110" y="134.0" width="350.0" height="18"
        rx="4" ry="4" class="bar-bg"/>

  <rect x="110" y="134.0" width="0" height="18"
        rx="4" ry="4"
        fill="#555555">
    <animate attributeName="width"
             from="0"
             to="133"
             dur="1.5s"
             fill="freeze"
             calcMode="spline"
             keySplines="0.4 0 0.2 1"
             keyTimes="0;1"/>
  </rect>

  <text x="470.0" y="147.66666666666666"
        class="progress-text">38.10%</text>

  <text x="20" y="182.66666666666666" class="label">Go :</text>

  <rect x="110" y="169.0" width="350.0" height="18"
        rx="4" ry="4" class="bar-bg"/>

  <rect x="110" y="169.0" width="0" height="18"
        rx="4" ry="4"
        fill="#00ADD8">
    <animate attributeName="width"
             from="0"
             to="25"
             dur="1.5s"
             fill="freeze"
             calcMode="spline"
             keySplines="0.4 0 0.2 1"
             keyTimes="0;1"/>
  </rect>

  <text x="470.0" y="182.66666666666666"
        class="progress-text">7.27%</text>

  <text x="20" y="217.66666666666666" class="label">Haskell :</text>

  <rect x="110" y="204.0" width="350.0" height="18"
        rx="4" ry="4" class="bar-bg"/>

  <rect x="110" y="204.0" width="0" height="18"
        rx="4" ry="4"
        fill="#5e5086">
    <animate attributeName="width"
             from="0"
             to="13"
             dur="1.5s"
             fill="freeze"
             calcMode="spline"
             keySplines="0.4 0 0.2 1"
             keyTimes="0;1"/>
